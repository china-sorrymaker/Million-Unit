name: Million-App-Base-AutoBuilder

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 核心补丁：生成多语言资源（解决资源找不到报错）
      - name: Initialize Languages
        run: python language_init.py

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. 核心补丁：解密签名文件（解决无法打包签名报错）
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | tr -d '\n ' | base64 --decode > release-key.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # 建议先只打 assembleRelease，出 APK 最快
        run: gradle assembleRelease

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Million-BMI-APK
          path: app/build/outputs/apk/release/*.apk
